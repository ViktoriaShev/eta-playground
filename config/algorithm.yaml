algorithm:
  # Флаги
  use_historical: true
  use_weather: true
  use_traffic: true
  # Веса
  weights:
    speed_based: 0.6 # Текущая скорость
    historical: 0.5 # Исторические данные (статистика)
    weather_adjustment: 0.1 # Погодные условия
    traffic_adjustment: 0.1 # Условия трафика
  # Коэффициенты погодных условий
  weather:
    rain_factor: 2.5 # Дождь
    snow_factor: 1.5 # Снег
  traffic:
    congestion_factor: 1.3 # Загруженность дорог
  # Пороги для принятия решений
  thresholds:
    bad_weather_speed_threshold: 20 # Eсли скорость ниже 20, считаем погоду плохой
    traffic_delay_threshold: 5 # Если задержка 5 минут из-за трафика, считаем ее значимой
# Интервал перечитывания конфига
config_reload_interval: 60
