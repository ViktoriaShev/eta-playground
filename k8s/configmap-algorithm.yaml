apiVersion: v1
kind: ConfigMap
metadata:
  name: algorithm-config
data:
  algorithm.yaml: |
    algorithm:
      use_historical: true
      use_weather: true
      use_traffic: true
      weights:
        speed_based: 0.6
        historical: 1.0
        weather_adjustment: 0.1
        traffic_adjustment: 0.1
      weather:
        rain_factor: 1.2
        snow_factor: 1.8
      traffic:
        congestion_factor: 1.3
      thresholds:
        bad_weather_speed_threshold: 20
        traffic_delay_threshold: 5
    config_reload_interval: 60
